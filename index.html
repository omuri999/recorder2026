<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리코더 운지법</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        .recorder-container { margin: 20px auto; }
        .note-btn { margin: 5px; padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>리코더 운지법 학습기</h1>
    <div id="visualizer" class="recorder-container">
        <svg id="recorder-svg" width="100" height="300"></svg>
    </div>
    <div id="controls"></div>

    <script>
        const notes = [
            { id: 'C4', label: '도', freq: 261.63, fingering: [1, 1, 1, 1, 1, 1, 1, 1] },
            { id: 'D4', label: '레', freq: 293.66, fingering: [1, 1, 1, 1, 1, 1, 1, 0] },
            { id: 'E4', label: '미', freq: 329.63, fingering: [1, 1, 1, 1, 1, 1, 0, 0] }
            // 여기에 원하는 음정을 더 추가할 수 있어요
        ];

        let audioCtx;
        function playSound(freq) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function drawRecorder(fingering) {
            const svg = document.getElementById('recorder-svg');
            let html = '<rect x="20" y="20" width="40" height="250" rx="10" fill="#f0e68c" stroke="black" />';
            fingering.forEach((val, i) => {
                const cy = 50 + i * 30;
                const fill = val === 1 ? 'black' : 'white';
                html += `<circle cx="40" cy="${cy}" r="8" fill="${fill}" stroke="black" />`;
            });
            svg.innerHTML = html;
        }

        const controls = document.getElementById('controls');
        notes.forEach(note => {
            const btn = document.createElement('button');
            btn.className = 'note-btn';
            btn.innerText = note.label;
            btn.onclick = () => {
                playSound(note.freq);
                drawRecorder(note.fingering);
            };
            controls.appendChild(btn);
        });
        
        drawRecorder(notes[0].fingering); // 초기화
    </script>
</body>
</html>
